title: "Austin Emmanuel Asangai"
subtitle: "Cybersecurity Analyst & Ethical Hacker"
name: "Austin Emmanuel Asangai "
description: "Penetration tester, SOC analyst and CTF player based in Kenya."
url: "https://austinasangai.github.io"
baseurl: ""
repository: "austinasangai/austinasangai.github.io"

remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: "default"

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Author (shows in sidebar on every page)
author:
  name: "Austin Asangai"
  avatar: "/assets/images/avatar.jpg"
  bio: "Penetration Tester · SOC Analyst · CTF Player. Securing systems and finding vulnerabilities."
  location: "Nairobi, Kenya"
  email: "john@email.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourusername"
    - label: "HackTheBox"
      icon: "fas fa-fw fa-flag"
      url: "https://app.hackthebox.com/profile/yourid"
    - label: "TryHackMe"
      icon: "fas fa-fw fa-shield-alt"
      url: "https://tryhackme.com/p/yourusername"

# Footer links
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourusername"

# Defaults — sets layout for every page/post/portfolio item automatically
defaults:
  # All pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

  # All blog posts
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true

  # All portfolio items
  - scope:
      path: "_portfolio"
      type: portfolio
    values:
      layout: single
      author_profile: false

# Portfolio collection
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

# Pagination for blog
paginate: 5
paginate_path: /blog/page:num/

# Reading files
include:
  - _pages

# Exclude from build
exclude:
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - vendor
